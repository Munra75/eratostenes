<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eratóstenes LMS - Msc. Aldo Zeas Castro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #0c0c14; color: #e5e7eb; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .sidebar { width: 300px; background: rgba(15, 15, 25, 0.98); border-right: 1px solid #b45309; }
        .nav-item { cursor: pointer; border-radius: 12px; transition: 0.3s; margin: 4px 0; font-size: 0.85rem; }
        .nav-item:hover, .nav-item.active { background: #b45309; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(180, 83, 9, 0.3); border-radius: 24px; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex h-screen">

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0c0c14]">
        <div class="p-10 glass-panel text-center space-y-4 w-[450px]">
            <h1 class="text-2xl font-serif text-amber-500 uppercase tracking-widest">Inicio de Sesión</h1>
            <div class="grid grid-cols-2 gap-4 text-left">
                <div>
                    <label class="text-[10px] text-amber-600 uppercase font-bold">Nombre</label>
                    <input id="u_name" type="text" placeholder="Ej: YANNIS" class="w-full bg-black/50 border border-amber-900/50 p-3 rounded-xl text-white outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-amber-600 uppercase font-bold">Apellido</label>
                    <input id="u_last" type="text" placeholder="Ej: DOUMAS" class="w-full bg-black/50 border border-amber-900/50 p-3 rounded-xl text-white outline-none">
                </div>
            </div>
            <div class="text-left">
                <label class="text-[10px] text-amber-600 uppercase font-bold">Día de Nacimiento</label>
                <input id="u_day" type="number" placeholder="Ej: 14" class="w-full bg-black/50 border border-amber-900/50 p-3 rounded-xl text-white outline-none">
            </div>
            <button onclick="login()" class="w-full bg-amber-700 hover:bg-amber-600 p-4 rounded-xl font-bold uppercase transition-all">Entrar</button>
        </div>
    </div>

    <aside id="sidebar" class="sidebar flex flex-col p-8 hidden">
        <div class="text-center mb-10">
            <p id="display-name" class="text-lg font-serif italic text-white"></p>
            <p id="display-id" class="text-[10px] text-amber-500 font-bold uppercase tracking-widest mt-1"></p>
        </div>
        <nav class="space-y-1">
            <div onclick="showTab('history')" id="btn-history" class="nav-item p-4 active">📖 Historia del Experimento</div>
            <div onclick="showTab('pretest')" id="btn-pretest" class="nav-item p-4">📝 Pretest</div>
            <div onclick="showTab('experiment')" id="btn-experiment" class="nav-item p-4">🧪 Experimento</div>
            <div onclick="showTab('postest')" id="btn-postest" class="nav-item p-4">📋 Postest</div>
            <div onclick="showTab('report')" id="btn-report" class="nav-item p-4 font-bold text-amber-500">📊 Informe</div>
        </nav>
        <div class="mt-auto text-[10px] text-center text-gray-600 border-t border-amber-900/20 pt-4">Msc. Aldo Zeas Castro</div>
    </aside>

    <main id="main-content" class="flex-grow p-12 hidden overflow-y-auto">
        <section id="tab-history" class="tab-view max-w-4xl mx-auto space-y-6">
            <h2 class="text-4xl font-serif text-amber-500 italic">Historia del Experimento</h2>
            <div class="glass-panel p-10 text-gray-300 leading-relaxed text-justify space-y-6">
                <p>Desde la antigüedad, sabios como Pitágoras comprendieron la magnífica redondez de nuestro hogar...</p>
                <img src="radio.png" class="w-full rounded-xl border border-amber-900/30" onerror="this.src='https://via.placeholder.com/800x400?text=Eratostenes+LMS'">
            </div>
        </section>

        <section id="tab-quiz" class="tab-view hidden max-w-2xl mx-auto">
            <div class="glass-panel p-10">
                <div class="flex justify-between items-center mb-6">
                    <span id="q-title" class="text-amber-500 font-bold uppercase"></span>
                    <span id="q-prog" class="text-[10px] text-amber-600 font-bold uppercase"></span>
                </div>
                <p id="q-text" class="text-2xl mb-8 font-serif italic"></p>
                <div id="q-options" class="space-y-3"></div>
            </div>
        </section>

        <section id="tab-experiment" class="tab-view hidden max-w-3xl mx-auto text-center space-y-8">
            <h2 class="text-4xl text-amber-500 font-serif italic">Medición de Campo</h2>
            <div class="glass-panel p-10 grid grid-cols-2 gap-8">
                <div class="space-y-2 text-left">
                    <label class="text-xs text-amber-600 uppercase font-bold">Altura del Gnomon (cm)</label>
                    <input id="h-gnomon" type="number" value="100" class="w-full bg-black/60 border border-amber-900/40 p-5 rounded-2xl text-white outline-none">
                </div>
                <div class="space-y-2 text-left">
                    <label class="text-xs text-amber-600 uppercase font-bold">Longitud Sombra (cm)</label>
                    <input id="s-sombra" type="number" placeholder="Ej: 15.4" class="w-full bg-black/60 border border-amber-900/40 p-5 rounded-2xl text-white outline-none">
                </div>
                <button onclick="calcCirc()" class="col-span-2 bg-amber-700 py-5 rounded-2xl font-black text-xl hover:bg-amber-600 transition-all">PROCESAR DATOS</button>
            </div>
        </section>

        <section id="tab-report" class="tab-view hidden max-w-xl mx-auto text-center space-y-8">
            <h2 class="text-4xl text-amber-500 font-serif italic">Informe Final</h2>
            <div class="glass-panel p-12 shadow-2xl">
                <p id="rep-id" class="text-xs text-amber-600 font-bold mb-4"></p>
                <p id="res-val" class="text-6xl font-black text-white">--</p>
            </div>
            <button onclick="exportPDF()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-xl">DESCARGAR INFORME PDF</button>
        </section>
    </main>

    <script>
        let session = { u: '', id: '', qIdx: 0, score: 0, currentType: '', results: {} };
        const questions = [
            { q: "Suponiendo que la luz del sol viene desde una distancia muy larga, el experimento Eratóstenes puede ser la base para demostrar que:", o: ["la Tierra es una esfera", "la Tierra no es plana", "la Tierra rota sobre sí misma", "la Tierra rota sobre el Sol"], c: 1 },
            { q: "El experimento Eratóstenes se realizó originalmente:", o: ["20 de marzo", "21 de junio", "Equinoccio", "Días calurosos"], c: 1 }
            // ... agregar las 8 preguntas oficiales aquí
        ];

        function login() {
            const n = document.getElementById('u_name').value.toUpperCase();
            const a = document.getElementById('u_last').value.toUpperCase();
            const d = document.getElementById('u_day').value;
            if(!n || !a || !d) return alert("Complete los datos.");
            session.id = `${d}${n.substring(0,2)}${a.substring(0,3)}`;
            session.u = `${n} ${a}`;
            document.getElementById('display-name').innerText = session.u;
            document.getElementById('display-id').innerText = `ID: ${session.id}`;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            showTab('history');
        }

        function showTab(t) {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(t === 'pretest' || t === 'postest') {
                session.currentType = t;
                session.qIdx = 0;
                document.getElementById('tab-quiz').classList.remove('hidden');
                renderQuiz();
            } else {
                document.getElementById(`tab-${t}`).classList.remove('hidden');
            }
            document.getElementById(`btn-${t}`).classList.add('active');
        }

        function renderQuiz() {
            const q = questions[session.qIdx];
            document.getElementById('q-title').innerText = session.currentType.toUpperCase();
            document.getElementById('q-prog').innerText = `Pregunta ${session.qIdx + 1} de ${questions.length}`;
            document.getElementById('q-text').innerText = q.q;
            const container = document.getElementById('q-options');
            container.innerHTML = '';
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 bg-white/5 border border-white/10 rounded-xl text-left hover:border-amber-500 transition-all";
                btn.innerText = opt;
                btn.onclick = () => {
                    if(i === q.c) session.score++;
                    session.qIdx++;
                    if(session.qIdx < questions.length) renderQuiz();
                    else alert(`${session.currentType} completado.`);
                };
                container.appendChild(btn);
            });
        }
        // ... funciones de cálculo e informe
    </script>
</body>
</html>
